<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Video | NuchoTV</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header>

<div class="logo">

<i class="fas fa-play-circle"></i>

<span>NuchoTV</span>

</div>

<nav>

<a href="index.html">Home</a>

<a href="search.html">Search</a>

<a href="profile.html">Profile</a>

</nav>

</header>

<section class="upload-page">

<h1>Upload Your Video</h1>

<form id="uploadForm">

<input
type="text"
placeholder="Video Title"
required>

<textarea
placeholder="Video Description"
required></textarea>

<input
type="text"
placeholder="#music #dance #viral">

<input
type="file"
id="videoFile"
accept="video/*"
required>

<video
id="preview"
controls
style="display:none;width:100%;margin-top:20px;border-radius:15px;">
</video>

<button type="submit">

<i class="fas fa-upload"></i>

Upload Video

</button>

</form>

</section>
<script type="module" src="Script.js"></script>
</body>
</html>
