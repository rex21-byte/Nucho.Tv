<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>NuchoTV</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<body>

<!-- Navigation -->

<header>

<div class="logo">

<i class="fas fa-play-circle"></i>

<span>NuchoTV</span>

</div>

<nav>

<a href="index.html">Home</a>

<a href="search.html">Explore</a>

<a href="profile.html">Creators</a>

<a href="login.html">Login</a>

</nav>

</header>

<!-- Hero -->

<section class="hero">

<div class="hero-text">

<h1>Create Amazing Videos</h1>

<p>

Share your talent with the world.

Watch millions of short videos.

Become the next big creator.

</p>

<a href="#" class="btn">

Start Watching

</a>

</div>

<div class="hero-image">

<img src="22.jpg" style="width:100px;height:100px;border-radius:80%;object-fit:cover;">

</div>

</section>

<!-- Video Feed -->

<section class="feed">

<h2>Trending Videos</h2>

<div class="video-card">

<video controls poster="images/thumb1.jpg">

<source src="10.mp4" type="video/mp4">

</video>

<div class="video-info">
  



</video>

<div class="video-info">

<img src="Nuch.jpg">

<div>

<h3>@Nucho</h3>

<p>Welcome to NuchoTV 🔥</p>

</div>

</div>

<div class="actions">

<button id="likeBtn">
  <i class="fas fa-heart"></i> 12K
</button>

<button id="commentBtn">
  <i class="fas fa-comment"></i> 1.3K
</button>

<button id="shareBtn">
  <i class="fas fa-share"></i> Share
</button>
</div>

</section>
<div class="actions"><button id="logoutBtn">Logout</button></div>

<footer>

<p>
<b>
© 2026 NuchoTV</b>

</p>

</footer>
